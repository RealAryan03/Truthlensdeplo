<svg width="860" height="520" viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Truth vs Fake</title>
  <desc id="desc">Abstract AI style split panel comparing trusted and fake content signals.</desc>
  <defs>
    <linearGradient id="left" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b3a3c"/>
      <stop offset="100%" stop-color="#0e6b63"/>
    </linearGradient>
    <linearGradient id="right" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a1024"/>
      <stop offset="100%" stop-color="#651d35"/>
    </linearGradient>
  </defs>
  <rect width="430" height="520" rx="28" fill="url(#left)"/>
  <rect x="430" width="430" height="520" rx="28" fill="url(#right)"/>
  <rect x="418" width="24" height="520" fill="#10233d"/>

  <g>
    <circle cx="220" cy="200" r="74" fill="#0e9f8d"/>
    <path d="M184 199 L212 226 L262 172" fill="none" stroke="#d4ffe6" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="170" y="332" fill="#d6fff4" font-family="Arial, sans-serif" font-size="30" font-weight="700">TRUTH</text>
    <rect x="102" y="360" width="240" height="14" rx="7" fill="#8adfd3" opacity="0.8"/>
    <rect x="124" y="388" width="200" height="14" rx="7" fill="#8adfd3" opacity="0.62"/>
  </g>

  <g>
    <circle cx="640" cy="200" r="74" fill="#bd345b"/>
    <path d="M605 166 L675 236 M675 166 L605 236" stroke="#ffe2e8" stroke-width="13" stroke-linecap="round"/>
    <text x="608" y="332" fill="#ffe0e8" font-family="Arial, sans-serif" font-size="30" font-weight="700">FAKE</text>
    <rect x="528" y="360" width="236" height="14" rx="7" fill="#f2a4ba" opacity="0.78"/>
    <rect x="548" y="388" width="194" height="14" rx="7" fill="#f2a4ba" opacity="0.58"/>
  </g>

  <text x="36" y="54" fill="#e4ecff" font-family="Arial, sans-serif" font-size="22" font-weight="700">Truth Signal vs Fake Signal</text>
</svg>
